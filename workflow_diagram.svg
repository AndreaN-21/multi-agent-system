<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" viewBox="0 0 680 1080" xmlns="http://www.w3.org/2000/svg" role="img" style="background:#fff;font-family:sans-serif">
  <title>Munder Difflin Multi-Agent Architecture</title>
  <desc>Detailed diagram showing four agents, their tools, the helper functions each tool wraps, and data flow between components</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; fill: #222; }
      .th { font-size: 14px; font-weight: 600; }
      .ts { font-size: 12px; fill: #555; }
      .arr { stroke: #888; stroke-width: 1; fill: none; }
      .inv { fill: #dbeafe; stroke: #3b82f6; }
      .quot { fill: #fef3c7; stroke: #d97706; }
      .ful { fill: #dcfce7; stroke: #16a34a; }
      .orch { fill: #ede9fe; stroke: #7c3aed; }
      .teal { fill: #ccfbf1; stroke: #0d9488; }
      .gray { fill: #f3f4f6; stroke: #9ca3af; }
      .step { fill: #ede9fe; stroke: #7c3aed; }
    </style>
  </defs>

  <!-- CUSTOMER REQUEST -->
  <rect x="215" y="16" width="250" height="40" rx="8" class="teal" stroke-width="0.8"/>
  <text class="th" x="340" y="40" text-anchor="middle">Customer request</text>
  <line x1="340" y1="56" x2="340" y2="80" class="arr" marker-end="url(#arrow)"/>

  <!-- ORCHESTRATOR -->
  <rect x="155" y="80" width="370" height="52" rx="8" class="orch" stroke-width="0.8"/>
  <text class="th" x="340" y="101" text-anchor="middle">Orchestrator agent</text>
  <text class="ts" x="340" y="120" text-anchor="middle">ToolCallingAgent · coordinates all sub-agents · max 25 steps</text>
  <path d="M250 132 L120 188" class="arr" marker-end="url(#arrow)"/>
  <path d="M330 132 L330 188" class="arr" marker-end="url(#arrow)"/>
  <path d="M420 132 L548 188" class="arr" marker-end="url(#arrow)"/>

  <!-- INVENTORY AGENT -->
  <rect x="20" y="188" width="200" height="52" rx="8" class="inv" stroke-width="0.8"/>
  <text class="th" x="120" y="209" text-anchor="middle">Inventory agent</text>
  <text class="ts" x="120" y="228" text-anchor="middle">Stock checks · restocking · delivery</text>

  <!-- QUOTING AGENT -->
  <rect x="235" y="188" width="210" height="52" rx="8" class="quot" stroke-width="0.8"/>
  <text class="th" x="340" y="209" text-anchor="middle">Quoting agent</text>
  <text class="ts" x="340" y="228" text-anchor="middle">Pricing · discounts · financial view</text>

  <!-- FULFILLMENT AGENT -->
  <rect x="460" y="188" width="200" height="52" rx="8" class="ful" stroke-width="0.8"/>
  <text class="th" x="560" y="209" text-anchor="middle">Fulfillment agent</text>
  <text class="ts" x="560" y="228" text-anchor="middle">Record sales · update revenue</text>

  <!-- INVENTORY TOOLS -->
  <line x1="120" y1="240" x2="120" y2="270" class="arr" marker-end="url(#arrow)"/>
  <rect x="20" y="270" width="200" height="44" rx="6" class="inv" stroke-width="0.6"/>
  <text class="th" x="120" y="287" text-anchor="middle">check_inventory</text>
  <text class="ts" x="120" y="303" text-anchor="middle">→ get_all_inventory()</text>
  <line x1="120" y1="314" x2="120" y2="326" stroke="#ccc" stroke-width="0.5"/>
  <rect x="20" y="326" width="200" height="44" rx="6" class="inv" stroke-width="0.6"/>
  <text class="th" x="120" y="343" text-anchor="middle">check_item_stock</text>
  <text class="ts" x="120" y="359" text-anchor="middle">→ get_stock_level()</text>
  <line x1="120" y1="370" x2="120" y2="382" stroke="#ccc" stroke-width="0.5"/>
  <rect x="20" y="382" width="200" height="44" rx="6" class="inv" stroke-width="0.6"/>
  <text class="th" x="120" y="399" text-anchor="middle">restock_item</text>
  <text class="ts" x="120" y="415" text-anchor="middle">→ create_transaction() + delivery</text>
  <line x1="120" y1="426" x2="120" y2="438" stroke="#ccc" stroke-width="0.5"/>
  <rect x="20" y="438" width="200" height="44" rx="6" class="inv" stroke-width="0.6"/>
  <text class="th" x="120" y="455" text-anchor="middle">get_delivery_date</text>
  <text class="ts" x="120" y="471" text-anchor="middle">→ get_supplier_delivery_date()</text>

  <!-- Input labels left -->
  <text class="ts" x="8" y="300" font-style="italic">item_name, date</text>
  <text class="ts" x="8" y="356" font-style="italic">item_name, date</text>
  <text class="ts" x="8" y="412" font-style="italic">item, qty, date</text>
  <text class="ts" x="8" y="468" font-style="italic">date, qty</text>

  <!-- QUOTING TOOLS -->
  <line x1="340" y1="240" x2="340" y2="270" class="arr" marker-end="url(#arrow)"/>
  <rect x="235" y="270" width="210" height="44" rx="6" class="quot" stroke-width="0.6"/>
  <text class="th" x="340" y="287" text-anchor="middle">get_quote_history</text>
  <text class="ts" x="340" y="303" text-anchor="middle">→ search_quote_history()</text>
  <line x1="340" y1="314" x2="340" y2="326" stroke="#ccc" stroke-width="0.5"/>
  <rect x="235" y="326" width="210" height="44" rx="6" class="quot" stroke-width="0.6"/>
  <text class="th" x="340" y="343" text-anchor="middle">get_cash_balance</text>
  <text class="ts" x="340" y="359" text-anchor="middle">→ get_cash_balance()</text>
  <line x1="340" y1="370" x2="340" y2="382" stroke="#ccc" stroke-width="0.5"/>
  <rect x="235" y="382" width="210" height="44" rx="6" class="quot" stroke-width="0.6"/>
  <text class="th" x="340" y="399" text-anchor="middle">generate_financial_report</text>
  <text class="ts" x="340" y="415" text-anchor="middle">→ generate_financial_report()</text>

  <!-- FULFILLMENT TOOLS -->
  <line x1="560" y1="240" x2="560" y2="270" class="arr" marker-end="url(#arrow)"/>
  <rect x="460" y="270" width="200" height="44" rx="6" class="ful" stroke-width="0.6"/>
  <text class="th" x="560" y="287" text-anchor="middle">fulfill_order</text>
  <text class="ts" x="560" y="303" text-anchor="middle">→ create_transaction() [sales]</text>
  <line x1="560" y1="314" x2="560" y2="326" stroke="#ccc" stroke-width="0.5"/>
  <rect x="460" y="326" width="200" height="44" rx="6" class="ful" stroke-width="0.6"/>
  <text class="th" x="560" y="343" text-anchor="middle">get_cash_balance</text>
  <text class="ts" x="560" y="359" text-anchor="middle">→ get_cash_balance()</text>

  <!-- Input labels right -->
  <text class="ts" x="672" y="300" text-anchor="end" font-style="italic">item, qty, price, date</text>
  <text class="ts" x="672" y="356" text-anchor="end" font-style="italic">date</text>

  <!-- DATABASE -->
  <rect x="155" y="530" width="370" height="56" rx="8" class="gray" stroke-width="0.8"/>
  <text class="th" x="340" y="551" text-anchor="middle">SQLite database</text>
  <text class="ts" x="340" y="570" text-anchor="middle">transactions · inventory · quotes · quote_requests</text>
  <path d="M120 482 Q120 555 155 558" class="arr" marker-end="url(#arrow)"/>
  <path d="M340 426 L340 530" class="arr" marker-end="url(#arrow)"/>
  <path d="M560 370 Q560 555 525 558" class="arr" marker-end="url(#arrow)"/>

  <!-- ORCHESTRATION FLOW -->
  <line x1="340" y1="586" x2="340" y2="620" class="arr" marker-end="url(#arrow)"/>

  <rect x="40" y="620" width="130" height="44" rx="6" class="step" stroke-width="0.6"/>
  <text class="th" x="105" y="638" text-anchor="middle">1. Check stock</text>
  <text class="ts" x="105" y="654" text-anchor="middle">inventory_agent</text>
  <line x1="170" y1="642" x2="198" y2="642" class="arr" marker-end="url(#arrow)"/>

  <rect x="198" y="620" width="130" height="44" rx="6" class="step" stroke-width="0.6"/>
  <text class="th" x="263" y="638" text-anchor="middle">2. Restock</text>
  <text class="ts" x="263" y="654" text-anchor="middle">if stock low</text>
  <line x1="328" y1="642" x2="356" y2="642" class="arr" marker-end="url(#arrow)"/>

  <rect x="356" y="620" width="130" height="44" rx="6" class="step" stroke-width="0.6"/>
  <text class="th" x="421" y="638" text-anchor="middle">3. Quote</text>
  <text class="ts" x="421" y="654" text-anchor="middle">quoting_agent</text>
  <line x1="486" y1="642" x2="514" y2="642" class="arr" marker-end="url(#arrow)"/>

  <rect x="514" y="620" width="126" height="44" rx="6" class="step" stroke-width="0.6"/>
  <text class="th" x="577" y="638" text-anchor="middle">4. Fulfill</text>
  <text class="ts" x="577" y="654" text-anchor="middle">fulfillment_agent</text>

  <line x1="340" y1="664" x2="340" y2="698" class="arr" marker-end="url(#arrow)"/>
  <rect x="175" y="698" width="330" height="40" rx="8" class="teal" stroke-width="0.8"/>
  <text class="th" x="340" y="718" text-anchor="middle">Quote + delivery confirmation to customer</text>

  <!-- DISCOUNT LEGEND -->
  <rect x="40" y="760" width="600" height="80" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
  <text class="th" x="340" y="782" text-anchor="middle">Bulk discount rules applied by quoting_agent</text>
  <text class="ts" x="160" y="808" text-anchor="middle">500 – 999 units</text>
  <text class="th" x="160" y="824" text-anchor="middle">5% discount</text>
  <text class="ts" x="340" y="808" text-anchor="middle">1 000 – 4 999 units</text>
  <text class="th" x="340" y="824" text-anchor="middle">10% discount</text>
  <text class="ts" x="520" y="808" text-anchor="middle">5 000+ units</text>
  <text class="th" x="520" y="824" text-anchor="middle">15% discount</text>

  <!-- HELPER FUNCTION TABLE -->
  <rect x="40" y="858" width="600" height="192" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
  <text class="th" x="340" y="880" text-anchor="middle">Helper function → tool mapping</text>
  <text class="ts" x="60" y="904">get_all_inventory()</text>
  <text class="ts" x="60" y="920">get_stock_level()</text>
  <text class="ts" x="60" y="936">get_supplier_delivery_date()</text>
  <text class="ts" x="60" y="952">create_transaction() [stock_orders]</text>
  <text class="ts" x="320" y="904">search_quote_history()</text>
  <text class="ts" x="320" y="920">get_cash_balance()</text>
  <text class="ts" x="320" y="936">generate_financial_report()</text>
  <text class="ts" x="320" y="952">create_transaction() [sales]</text>
  <line x1="50" y1="965" x2="630" y2="965" stroke="#e5e7eb" stroke-width="0.5"/>
  <rect x="52" y="972" width="10" height="10" rx="2" fill="#dbeafe" stroke="#3b82f6" stroke-width="0.5"/>
  <text class="ts" x="68" y="982">Inventory agent tools</text>
  <rect x="192" y="972" width="10" height="10" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="0.5"/>
  <text class="ts" x="208" y="982">Quoting agent tools</text>
  <rect x="332" y="972" width="10" height="10" rx="2" fill="#dcfce7" stroke="#16a34a" stroke-width="0.5"/>
  <text class="ts" x="348" y="982">Fulfillment agent tools</text>
  <rect x="472" y="972" width="10" height="10" rx="2" fill="#ede9fe" stroke="#7c3aed" stroke-width="0.5"/>
  <text class="ts" x="488" y="982">Orchestrator</text>
  <rect x="552" y="972" width="10" height="10" rx="2" fill="#f3f4f6" stroke="#9ca3af" stroke-width="0.5"/>
  <text class="ts" x="568" y="982">Database</text>
  <text class="ts" x="340" y="1042" text-anchor="middle">Munder Difflin Paper Company · Multi-Agent System · smolagents framework</text>
</svg>
